services:
  # Backend Service
  - type: web
    name: item-manager-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        value: mongodb+srv://cvideshana_db_user:chrishean123@cluster0.2isaqwd.mongodb.net/?appName=Cluster0
      - key: NODE_VERSION
        value: "20"

  # Frontend Service (Static Site)
  - type: web
    name: item-manager-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://wmt-labtest-10.onrender.com/api